<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei Vinili - Antonino Daidone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="top-wrapper">
    <header class="main-header">
        <img src="foto-profilo.png" alt="Foto di Antonino Daidone" class="profile-img">
        <div class="header-text">
            <h1>
                Ciao, sono Antonino!!<br>
                <span class="spostato-1">o Tonino!!</span><br>
                <span class="spostato-2">o Nino!!</span>
            </h1>
            <p>La mia collezione di Vinili</p>
        </div>
    </header>

    <nav class="hobby-nav">
        <ul>
            <li><a href="index.html" class="hobby-link">Home 🏠</a></li>
            <li><a href="trekking.html" class="hobby-link">Trekking 🥾</a></li>
        </ul>
    </nav>
</div>

<section class="about-section">
    <h2><i class="fa-solid fa-record-vinyl"></i> Lo Sfogliatore 3D</h2>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">

            <div class="swiper-slide album-item">
                <img src="img/vinile/dark-side.jpg" alt="Dark Side" class="album-cover">
                <div class="album-info">
                    <h3>The Dark Side of the Moon</h3>
                    <p><strong>Pink Floyd</strong> | 1973</p>
                </div>
            </div>

            <div class="swiper-slide album-item">
                <img src="img/vinile/kind-of-blue.jpg" alt="Kind of Blue" class="album-cover">
                <div class="album-info">
                    <h3>Kind of Blue</h3>
                    <p><strong>Miles Davis</strong> | 1959</p>
                </div>
            </div>

            <div class="swiper-slide album-item">
                <img src="img/vinile/led-zeppelin-4.jpg" alt="Led Zeppelin IV" class="album-cover">
                <div class="album-info">
                    <h3>Led Zeppelin IV</h3>
                    <p><strong>Led Zeppelin</strong> | 1971</p>
                </div>
            </div>

        </div>
        <div class="swiper-pagination"></div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="js/script-vinile.js"></script>
</body>
</html>
